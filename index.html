<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宏观周期资产沙盒</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}

  :root{
    --bg:#f7f6f3;
    --surface:#ffffff;
    --surface-alt:#f2f1ee;
    --border:rgba(0,0,0,0.09);
    --border-strong:rgba(0,0,0,0.15);
    --text:#0f0f0e;
    --text-2:#52514e;
    --text-3:#898781;
    --radius:8px;
    --accent:#2a78d6;
  }

  @media(prefers-color-scheme:dark){
    :root{
      --bg:#111110;
      --surface:#1c1c1a;
      --surface-alt:#252523;
      --border:rgba(255,255,255,0.09);
      --border-strong:rgba(255,255,255,0.16);
      --text:#f0efe9;
      --text-2:#b0ae a6;
      --text-3:#898781;
      --accent:#5599e8;
    }
    :root { --text-2:#b0aea6; }
  }

  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    font-size:14px;
    min-height:100vh;
    padding:24px 16px 48px;
  }

  .page{max-width:860px;margin:0 auto}

  header{margin-bottom:24px}
  header h1{
    font-size:22px;font-weight:600;letter-spacing:-.02em;
    margin-bottom:4px;
  }
  header p{font-size:13px;color:var(--text-2)}

  .grid-top{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
  .grid-bot{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  @media(max-width:580px){
    .grid-top,.grid-bot{grid-template-columns:1fr}
  }

  .card{
    background:var(--surface);
    border:0.5px solid var(--border);
    border-radius:12px;
    padding:16px 18px;
  }
  .card-title{
    font-size:11px;font-weight:600;letter-spacing:.06em;
    text-transform:uppercase;color:var(--text-3);
    margin-bottom:14px;
  }

  /* sliders */
  .slider-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .slider-row:last-child{margin-bottom:0}
  .s-label{font-size:12px;color:var(--text-2);width:100px;flex-shrink:0}
  .s-val{font-size:12px;font-weight:600;color:var(--text);width:42px;text-align:right;flex-shrink:0}

  input[type=range]{
    -webkit-appearance:none;appearance:none;
    flex:1;height:4px;border-radius:2px;
    background:var(--border-strong);outline:none;cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:16px;height:16px;border-radius:50%;
    background:var(--accent);border:2px solid var(--surface);
    box-shadow:0 0 0 1px var(--accent);cursor:pointer;
  }
  input[type=range]::-moz-range-thumb{
    width:16px;height:16px;border-radius:50%;border:2px solid var(--surface);
    background:var(--accent);cursor:pointer;
  }

  /* preset buttons */
  .preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
  .preset-btn{
    font-size:12px;padding:9px 11px;
    border:0.5px solid var(--border-strong);border-radius:var(--radius);
    background:transparent;color:var(--text-2);
    cursor:pointer;text-align:left;line-height:1.4;
    transition:background .15s,color .15s,border-color .15s;
  }
  .preset-btn:hover{background:var(--surface-alt)}
  .preset-btn.active{
    background:#dfeeff;border-color:#2a78d6;color:#1a5fad;
  }
  @media(prefers-color-scheme:dark){
    .preset-btn.active{background:#0d2d4a;border-color:#5599e8;color:#7bbcff}
  }

  .cycle-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
  .cycle-desc{font-size:12px;color:var(--text-2);line-height:1.55}
  .kpi-row{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
  .kpi-chip{
    font-size:10.5px;padding:3px 8px;border-radius:20px;
    background:var(--surface-alt);border:0.5px solid var(--border);
    color:var(--text-2);
  }
  .placeholder{font-size:12px;color:var(--text-3);padding-top:4px}

  /* asset grid */
  .asset-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
  .asset-cell{
    border-radius:var(--radius);padding:9px 10px;
    border:0.5px solid transparent;transition:all .3s;
  }
  .asset-name{font-size:11px;font-weight:600;margin-bottom:2px}
  .asset-score{font-size:20px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
  .asset-lbl{font-size:10px;margin-top:2px;opacity:.8}

  .logic-box{
    font-size:12px;color:var(--text-2);line-height:1.65;
    background:var(--surface-alt);border-radius:var(--radius);
    padding:10px 12px;border:0.5px solid var(--border);
    min-height:52px;
  }

  /* radar */
  .radar-wrap{display:flex;justify-content:center;flex-direction:column;align-items:center}
  canvas{display:block}
  .legend-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;justify-content:center}
  .legend-item{font-size:11px;color:var(--text-2);display:flex;align-items:center;gap:4px}
  .legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

  footer{
    margin-top:28px;text-align:center;
    font-size:11px;color:var(--text-3);
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <h1>宏观周期资产沙盒</h1>
    <p>调整宏观环境参数，动态预测不同资产的相对表现</p>
  </header>

  <div class="grid-top">
    <!-- sliders -->
    <div class="card">
      <div class="card-title">宏观环境</div>
      <div class="slider-row">
        <span class="s-label">通胀 Inflation</span>
        <input type="range" id="s-inf" min="0" max="100" value="50" step="1" oninput="update()">
        <span class="s-val" id="v-inf">5.0%</span>
      </div>
      <div class="slider-row">
        <span class="s-label">利率 Rate</span>
        <input type="range" id="s-rate" min="0" max="100" value="50" step="1" oninput="update()">
        <span class="s-val" id="v-rate">2.5%</span>
      </div>
      <div class="slider-row">
        <span class="s-label">美元指数 DXY</span>
        <input type="range" id="s-dxy" min="80" max="120" value="100" step="0.5" oninput="update()">
        <span class="s-val" id="v-dxy">100.0</span>
      </div>
    </div>

    <!-- presets -->
    <div class="card">
      <div class="card-title">周期快捷键</div>
      <div class="preset-grid">
        <button class="preset-btn" id="p0" onclick="applyPreset(0)">🕊 联储降息周期</button>
        <button class="preset-btn" id="p1" onclick="applyPreset(1)">🌊 大宗 La Niña</button>
        <button class="preset-btn" id="p2" onclick="applyPreset(2)">🐂 大牛市持有</button>
        <button class="preset-btn" id="p3" onclick="applyPreset(3)">🐻 熊市做空</button>
      </div>
      <div id="cycle-info">
        <div class="placeholder">← 选择一个周期快捷键</div>
      </div>
    </div>
  </div>

  <div class="grid-bot">
    <!-- radar -->
    <div class="card">
      <div class="card-title">资产雷达</div>
      <div class="radar-wrap">
        <canvas id="radar" width="260" height="210" role="img" aria-label="多资产宏观周期雷达图"></canvas>
        <div class="legend-row" id="radar-legend"></div>
      </div>
    </div>

    <!-- asset cards + logic -->
    <div class="card">
      <div class="card-title">资产表现预测（0–100）</div>
      <div class="asset-grid" id="asset-grid"></div>
      <div class="logic-box" id="logic-box">调整左侧滑块以查看跨市场资金流动逻辑...</div>
    </div>
  </div>

  <footer>宏观周期资产沙盒 · 仅供学习参考，不构成投资建议</footer>
</div>

<script>
const assets=[
  {key:'value',name:'价值股',  color:'#2a78d6'},
  {key:'tech', name:'科技股',  color:'#1baf7a'},
  {key:'bonds',name:'美债',    color:'#4a3aa7'},
  {key:'gold', name:'黄金',    color:'#eda100'},
  {key:'oil',  name:'原油',    color:'#eb6834'},
  {key:'btc',  name:'比特币',  color:'#e34948'},
];

const presets=[
  {
    inf:35,rate:20,dxy:92,
    name:'🕊 联储降息周期',
    desc:'通胀受控，联储削减利率，美元走弱（DXY≈90–94），全球流动性宽松。典型如2019–2020年、2007–2008年降息初期。',
    kpis:['DXY ≈ 92','10Y收益率↓','信用利差收窄','M2增速↑'],
    logic:'降息→美元走弱→全球风险资产受益。弱美元直接提振以美元计价的黄金与原油；科技股因贴现率下降获估值重估；加密资产随风险偏好抬升；新兴市场资本回流。'
  },
  {
    inf:75,rate:55,dxy:103,
    name:'🌊 大宗 La Niña 周期',
    desc:'La Niña带来极端气候，粮食与能源供给收紧，推升通胀。美元中性偏强（DXY≈100–106），新兴市场承压。',
    kpis:['DXY ≈ 103','农产品↑30%+','天然气高波动','CPI食品项↑'],
    logic:'供给冲击推升大宗商品价格，原油与农产品领涨；强美元压制新兴市场进口成本；黄金对冲通胀属性凸显但受强美元抑制；科技股因高通胀→利率上行而承压。'
  },
  {
    inf:30,rate:25,dxy:90,
    name:'🐂 大牛市持有期',
    desc:'低通胀、低利率、弱美元（DXY≈88–93）。典型如2009–2021年"金发姑娘"环境，全球风险资产普涨。',
    kpis:['DXY ≈ 90','VIX < 15','PE扩张','纳指领涨'],
    logic:'弱美元+低利率形成双重宽松：科技成长股估值大幅扩张，加密资产爆发性上涨；黄金受弱美元支撑；原油因全球需求旺盛走强；价值股同步但弱于成长。'
  },
  {
    inf:70,rate:80,dxy:113,
    name:'🐻 熊市做空期',
    desc:'高通胀+激进加息→强美元（DXY≈108–115）+流动性收缩。典型如2022年，全球资产同步下跌。',
    kpis:['DXY ≈ 113','VIX > 30','利差走阔','新兴市场危机'],
    logic:'强美元是熊市核心传导链：美元走强→全球流动性抽离→风险资产崩跌（科技股、加密首当其冲）；黄金虽抗通胀但受强美元压制；新兴市场遭双杀（资本外流+债务压力）。'
  }
];

function calcScores(inf,rate,dxy){
  const i=inf/100, r=rate/100;
  // DXY 80→120 映射；dxy越高=美元越强=流动性越紧，与原liq逻辑反向
  const l=1-((dxy-80)/40); // 弱美元(80)→l=1(宽松), 强美元(120)→l=0(收紧)
  return{
    value:clamp(Math.round(40+20*(1-r)+15*i+10*l)),
    tech: clamp(Math.round(50+30*(1-r)+20*l-20*i)),
    bonds:clamp(Math.round(70-40*r+10*(1-i)-5*l)),
    gold: clamp(Math.round(30+30*i+20*(1-r)+15*l-20*r)), // 弱美元额外加成
    oil:  clamp(Math.round(30+30*i+10*l-10*r)),
    btc:  clamp(Math.round(20+40*l-20*r-15*i+15*l)),
  };
}
function clamp(v){return Math.max(0,Math.min(100,v))}

function scoreStyle(s){
  if(s>=70) return{bg:'#eaf3de',border:'#639922',text:'#2e5a0a',label:'强势 Outperform'};
  if(s>=50) return{bg:'#faeeda',border:'#ba7517',text:'#7a4c08',label:'中性 Neutral'};
  return{bg:'#fcebeb',border:'#c03030',text:'#8a1f1f',label:'承压 Underperform'};
}

function drawRadar(scores){
  const canvas=document.getElementById('radar');
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  const cx=W/2,cy=H/2+8,R=78;
  ctx.clearRect(0,0,W,H);
  const n=assets.length;
  const ang=i=>-Math.PI/2+(2*Math.PI*i)/n;
  const dark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const gridCol=dark?'rgba(255,255,255,0.1)':'rgba(0,0,0,0.08)';
  const txtCol=dark?'rgba(255,255,255,0.5)':'rgba(0,0,0,0.4)';
  for(let g=1;g<=4;g++){
    ctx.beginPath();
    for(let i=0;i<n;i++){
      const r=R*g/4,x=cx+r*Math.cos(ang(i)),y=cy+r*Math.sin(ang(i));
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();ctx.strokeStyle=gridCol;ctx.lineWidth=0.8;ctx.stroke();
  }
  for(let i=0;i<n;i++){
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.lineTo(cx+R*Math.cos(ang(i)),cy+R*Math.sin(ang(i)));
    ctx.strokeStyle=gridCol;ctx.lineWidth=0.8;ctx.stroke();
  }
  const vals=assets.map(a=>clamp(scores[a.key])/100);
  ctx.beginPath();
  for(let i=0;i<n;i++){
    const r=R*vals[i],x=cx+r*Math.cos(ang(i)),y=cy+r*Math.sin(ang(i));
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.fillStyle='rgba(42,120,214,0.15)';ctx.fill();
  ctx.strokeStyle='#2a78d6';ctx.lineWidth=2;ctx.stroke();
  for(let i=0;i<n;i++){
    const r=R*vals[i],x=cx+r*Math.cos(ang(i)),y=cy+r*Math.sin(ang(i));
    ctx.beginPath();ctx.arc(x,y,4.5,0,Math.PI*2);
    ctx.fillStyle=assets[i].color;ctx.fill();
  }
  ctx.font='11px -apple-system,BlinkMacSystemFont,sans-serif';
  ctx.fillStyle=txtCol;ctx.textAlign='center';ctx.textBaseline='middle';
  for(let i=0;i<n;i++){
    const pad=17,x=cx+(R+pad)*Math.cos(ang(i)),y=cy+(R+pad)*Math.sin(ang(i));
    ctx.fillText(assets[i].name,x,y);
  }
  document.getElementById('radar-legend').innerHTML=
    assets.map(a=>`<span class="legend-item"><span class="legend-dot" style="background:${a.color}"></span>${a.name}</span>`).join('');
}

function update(){
  const inf=parseInt(document.getElementById('s-inf').value);
  const rate=parseInt(document.getElementById('s-rate').value);
  const dxy=parseFloat(document.getElementById('s-dxy').value);
  document.getElementById('v-inf').textContent=(inf/10).toFixed(1)+'%';
  document.getElementById('v-rate').textContent=(rate/20).toFixed(1)+'%';
  // DXY 色彩语义标签
  let dxyLabel='';
  if(dxy<=88) dxyLabel='极弱';
  else if(dxy<=95) dxyLabel='偏弱';
  else if(dxy<=105) dxyLabel='中性';
  else if(dxy<=112) dxyLabel='偏强';
  else dxyLabel='极强';
  document.getElementById('v-dxy').textContent=dxy.toFixed(1)+' '+dxyLabel;
  const scores=calcScores(inf,rate,dxy);
  drawRadar(scores);
  document.getElementById('asset-grid').innerHTML=assets.map(a=>{
    const s=clamp(scores[a.key]),c=scoreStyle(s);
    return`<div class="asset-cell" style="background:${c.bg};border-color:${c.border}">
      <div class="asset-name" style="color:${c.text}">${a.name}</div>
      <div class="asset-score" style="color:${c.text}">${s}</div>
      <div class="asset-lbl" style="color:${c.text}">${c.label}</div>
    </div>`;
  }).join('');
  const dominant=assets.reduce((a,b)=>scores[a.key]>scores[b.key]?a:b);
  const weakest=assets.reduce((a,b)=>scores[a.key]<scores[b.key]?a:b);
  let logic='';
  if(dxy<=95&&rate<40) logic='弱美元（DXY<95）+低利率：全球流动性宽松，风险偏好高涨。资金流向科技成长、黄金与加密资产，新兴市场同步受益。';
  else if(dxy>=108&&rate>60) logic='强美元（DXY>108）+高利率：美元抽走全球流动性，高估值资产首当其冲（科技、加密崩跌），新兴市场遭资本外流双杀。';
  else if(inf>65&&dxy<=100) logic='通胀高企+弱美元：实际利率为负，黄金与大宗商品是双重受益者（通胀对冲×弱美元提振）。成长股承压。';
  else if(inf>65&&dxy>=105) logic='滞胀+强美元：最差组合。成长股与债券双杀，黄金受强美元压制，原油受需求萎缩拖累。价值股相对防御。';
  else if(inf<35&&rate<35&&dxy<=95) logic='金发姑娘时代：低通胀+低利率+弱美元，科技股与成长资产估值大幅扩张，加密资产爆发，黄金受弱美元支撑。';
  else logic=`当前 DXY ${dxy.toFixed(1)}（${dxyLabel}）信号：${dominant.name}综合得分最高（${scores[dominant.key]}），跨市场资金倾向流入；${weakest.name}（${scores[weakest.key]}）承压最重。`;
  document.getElementById('logic-box').textContent=logic;
}

function applyPreset(idx){
  document.querySelectorAll('.preset-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  const p=presets[idx];
  document.getElementById('s-inf').value=p.inf;
  document.getElementById('s-rate').value=p.rate;
  document.getElementById('s-dxy').value=p.dxy;
  document.getElementById('cycle-info').innerHTML=
    `<div class="cycle-name">${p.name}</div>
     <div class="cycle-desc">${p.desc}</div>
     <div class="kpi-row">${p.kpis.map(k=>`<span class="kpi-chip">${k}</span>`).join('')}</div>`;
  document.getElementById('logic-box').textContent=p.logic;
  update();
}

update();
window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',()=>{
  const inf=parseInt(document.getElementById('s-inf').value);
  const rate=parseInt(document.getElementById('s-rate').value);
  const dxy=parseFloat(document.getElementById('s-dxy').value);
  drawRadar(calcScores(inf,rate,dxy));
});
</script>
</body>
</html>
